<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Viewport: cover for notch/Dynamic Island, prevent user zoom -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#000000" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CricFusion" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- SEO -->
    <meta name="description" content="Watch live Cricket, Football, FIFA World Cup 2026, Tennis, NBA and more — free HD streaming on CricFusion." />
    <meta name="application-name" content="CricFusion" />
    <title>CricFusion - Live Sports Streaming</title>

    <!-- Open Graph (WhatsApp, Telegram, Facebook, iMessage) -->
    <meta property="og:type"              content="website" />
    <meta property="og:site_name"         content="CricFusion" />
    <meta property="og:title"             content="CricFusion — Watch Live Sports Free" />
    <meta property="og:description"       content="Live Cricket, Football, FIFA World Cup 2026, F1, NBA and more in HD quality — free, no sign-up." />
    <meta property="og:url"               content="https://cricfusion.vercel.app" />
    <meta property="og:image"             content="https://cricfusion.vercel.app/og-image.png" />
    <meta property="og:image:type"        content="image/png" />
    <meta property="og:image:width"       content="1200" />
    <meta property="og:image:height"      content="630" />
    <meta property="og:image:alt"         content="CricFusion Live Sports Streaming" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card"             content="summary_large_image" />
    <meta name="twitter:title"            content="CricFusion — Watch Live Sports Free" />
    <meta name="twitter:description"      content="Live Cricket, Football, FIFA World Cup 2026, F1, NBA and more in HD — free, no sign-up." />
    <meta name="twitter:image"            content="https://cricfusion.vercel.app/og-image.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Shaka Player for DASH/MPD + ClearKey DRM streams.
         Deferred so it never blocks first paint — it's only needed once a DASH
         stream actually plays. The player waits for window.shaka before use. -->
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.compiled.min.js"
            onload="window.__shakaReady=true;window.dispatchEvent(new Event('shakaready'))"></script>

    <!-- Google Cast SDK — dispatches 'castready' when available -->
    <script>window['__onGCastApiAvailable']=function(ok){if(ok){window.__castReady=true;window.dispatchEvent(new Event('castready'))}}</script>
    <script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1" async></script>
  </head>
  <body class="bg-black">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
