<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#863bff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#c8ff00" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8ff00"/>
      <stop offset="100%" stop-color="#863bff"/>
    </linearGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="80"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="50"/></filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient glows -->
  <ellipse cx="200" cy="200" rx="320" ry="260" fill="#863bff" opacity="0.18" filter="url(#blur1)"/>
  <ellipse cx="1050" cy="450" rx="280" ry="220" fill="#c8ff00" opacity="0.10" filter="url(#blur1)"/>
  <ellipse cx="600" cy="630" rx="500" ry="200" fill="#863bff" opacity="0.12" filter="url(#blur2)"/>

  <!-- Grid lines (subtle) -->
  <g stroke="rgba(255,255,255,0.04)" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
  </g>

  <!-- LIVE badge (top left) -->
  <rect x="72" y="64" width="72" height="28" rx="6" fill="#dc2626"/>
  <circle cx="87" cy="78" r="4" fill="white" opacity="0.9"/>
  <text x="97" y="83" font-family="Arial, sans-serif" font-size="13" font-weight="900" fill="white" letter-spacing="1">LIVE</text>

  <!-- Logo bolt icon (centered-left) -->
  <g transform="translate(310, 210)">
    <path d="M52 0 L30 42 H54 L22 90 L70 34 H44 Z" fill="url(#bolt)" opacity="0.95"/>
  </g>

  <!-- CRICFUSION wordmark -->
  <text x="408" y="262" font-family="Arial Black, Arial, sans-serif" font-size="72" font-weight="900" fill="white" letter-spacing="-1">CRIC</text>
  <text x="643" y="262" font-family="Arial Black, Arial, sans-serif" font-size="72" font-weight="900" fill="#c8ff00" letter-spacing="-1">FUSION</text>

  <!-- Tagline -->
  <text x="408" y="308" font-family="Arial, sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.45)" letter-spacing="3">LIVE SPORTS STREAMING</text>

  <!-- Divider -->
  <rect x="408" y="334" width="480" height="2" rx="1" fill="rgba(200,255,0,0.3)"/>

  <!-- Sport icons row -->
  <text x="408" y="390" font-family="Arial, sans-serif" font-size="32">🏆 🏏 ⚽ 🎾 🏀 🏎️</text>

  <!-- Bottom label -->
  <text x="600" y="530" font-family="Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.25)" text-anchor="middle" letter-spacing="2">cricfusion.vercel.app</text>

  <!-- Bottom bar -->
  <rect x="0" y="610" width="1200" height="20" fill="url(#bolt)" opacity="0.6"/>
</svg>
